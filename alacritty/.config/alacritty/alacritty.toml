[env]
TERM = "xterm-256color"

[font]
normal = { family = "CaskaydiaMono Nerd Font Mono" }
bold = { family = "CaskaydiaMono Nerd Font Mono" }
italic = { family = "CaskaydiaMono Nerd Font Mono" }
size = 13

[window]
padding.x = 14
padding.y = 14
decorations = "Buttonless"
option_as_alt = "Both"

[colors.primary]
foreground = "#bdbdbd"
background = "#080808"

[colors.cursor]
text = "#080808"
cursor = "#9e9e9e"

[colors.selection]
text = "#080808"
background = "#b2ceee"

[colors.normal]
black = "#323437"
red = "#ff5454"
green = "#8cc85f"
yellow = "#e3c78a"
blue = "#80a0ff"
magenta = "#cf87e8"
cyan = "#79dac8"
white = "#c6c6c6"

[colors.bright]
black = "#949494"
red = "#ff5189"
green = "#36c692"
yellow = "#c6c684"
blue = "#74b2ff"
magenta = "#ae81ff"
cyan = "#85dc85"
white = "#e4e4e4"

[keyboard]
bindings = [
  { key = "Insert", mods = "Shift", action = "Paste" },
  { key = "Insert", mods = "Control", action = "Copy" },
  { key = "Return", mods = "Shift", chars = "\r" }
]

[terminal]
osc52 = "CopyPaste"
