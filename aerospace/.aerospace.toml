after-login-command = []
after-startup-command = []
start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

automatically-unhide-macos-hidden-apps = false

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 0
inner.vertical   = 0
outer.left       = 0
outer.bottom     = 0
outer.top        = 0
outer.right      = 0

[mode.main.binding]

# ── Window focus (mirrors Hyprland SUPER+H/J/K/L) ───────────────────
# CMD-H is reserved by macOS (hide app). Using ALT for window nav.
alt-h         = 'focus left'
alt-j         = 'focus down'
alt-k         = 'focus up'
alt-semicolon = 'focus right'

# Move windows
alt-shift-h         = 'move left'
alt-shift-j         = 'move down'
alt-shift-k         = 'move up'
alt-shift-semicolon = 'move right'

# Resize mode (mirrors Hyprland SUPER+S submap)
cmd-s = 'mode resize'

# Toggle layouts (mirrors SUPER+UP toggle split)
alt-slash    = 'layout tiles horizontal vertical'
alt-comma    = 'layout accordion horizontal vertical'
alt-shift-f  = 'fullscreen'
alt-f        = 'macos-native-fullscreen'

# Float / tile toggle
alt-shift-space = 'layout floating tiling'

# Workspaces (mirrors Hyprland workspace switch)
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Move window to workspace
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

# Cycle workspaces (mirrors Hyprland SUPER+TAB / SUPER+SHIFT+TAB)
alt-tab       = 'workspace next --wrap-around'
alt-shift-tab = 'workspace prev --wrap-around'
alt-ctrl-tab  = 'workspace-back-and-forth'

# Move workspace to other monitor (SUPER+SHIFT+ALT+arrows)
alt-shift-ctrl-left  = 'move-workspace-to-monitor --wrap-around prev'
alt-shift-ctrl-right = 'move-workspace-to-monitor --wrap-around next'

# Lock screen (mirrors SUPER+CTRL+L). cmd-ctrl-q is the macOS native too.
alt-ctrl-l = 'exec-and-forget pmset displaysleepnow'

# ── App launchers (mirrors Hyprland SUPER / SUPER+SHIFT) ────────────
# CMD-RETURN = terminal (matches SUPER+RETURN)
cmd-enter       = '''exec-and-forget osascript -e '
tell application "Ghostty"
  activate
  tell application "System Events" to keystroke "n" using command down
end tell
' '''

cmd-shift-enter = 'exec-and-forget open -na "Google Chrome"'

cmd-shift-f     = 'exec-and-forget open -a "Finder"'
cmd-shift-b     = 'exec-and-forget open -a "Google Chrome"'
cmd-shift-m     = 'exec-and-forget open -a "Spotify"'
cmd-shift-n     = 'exec-and-forget open -a "Cursor"'
cmd-shift-g     = 'exec-and-forget open -a "Signal"'
cmd-shift-o     = 'exec-and-forget open -a "Obsidian"'
cmd-shift-w     = 'exec-and-forget open -a "Typora"'
cmd-shift-slash = 'exec-and-forget open -a "1Password"'

# Webapps via default browser
cmd-shift-a = 'exec-and-forget open https://chatgpt.com'
cmd-shift-c = 'exec-and-forget open https://app.hey.com/calendar/weeks/'
cmd-shift-e = 'exec-and-forget open https://app.hey.com'
cmd-shift-y = 'exec-and-forget open https://youtube.com/'
cmd-shift-x = 'exec-and-forget open https://x.com/'

# Reload config
alt-shift-c = 'reload-config'

[mode.resize.binding]
h = 'resize width -40'
j = 'resize height +40'
k = 'resize height -40'
l = 'resize width +40'
enter  = 'mode main'
esc    = 'mode main'

# ── Window rules ────────────────────────────────────────────────────
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
if.window-title-regex-substring = 'Copy|Move|Info'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.1password.1password'
run = 'layout floating'
